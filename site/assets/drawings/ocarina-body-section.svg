<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Helvetica, Arial, sans-serif">
  <!-- Title block -->
  <rect x="0" y="0" width="800" height="500" fill="white" stroke="#222" stroke-width="1"/>
  <rect x="0" y="0" width="800" height="36" fill="#1F3A68"/>
  <text x="12" y="24" fill="white" font-size="16" font-weight="bold">Ocarina — Body Cross-Section (sagittal plane through fipple)</text>
  <text x="788" y="24" fill="white" font-size="10" text-anchor="end">OCA-DRW-001 | REV-A | 2026-05-02 | Units: inches | Scale 2:1</text>

  <!-- Outer body profile (lentil) -->
  <path d="M 200 250
           C 200 110, 540 110, 600 230
           L 720 250
           L 600 270
           C 540 390, 200 390, 200 250 Z"
        fill="none" stroke="#222" stroke-width="2"/>

  <!-- Inner chamber profile -->
  <path d="M 230 250
           C 230 140, 530 140, 580 232
           L 690 250
           L 580 268
           C 530 360, 230 360, 230 250 Z"
        fill="#F1F4FA" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Fipple/voicing window detail -->
  <rect x="555" y="195" width="40" height="18" fill="none" stroke="#C0392B" stroke-width="1.5"/>
  <line x1="540" y1="220" x2="610" y2="220" stroke="#C0392B" stroke-width="1.5"/>
  <text x="600" y="190" fill="#C0392B" font-size="10">voicing window 0.354 × 0.197 in (W × H)</text>
  <text x="600" y="240" fill="#C0392B" font-size="10">labium edge — sharp, tunable</text>

  <!-- Mouthpiece + windway -->
  <path d="M 690 250 L 760 250 L 760 260 L 690 260 Z" fill="none" stroke="#222" stroke-width="2"/>
  <text x="725" y="278" fill="#222" font-size="10" text-anchor="middle">mouthpiece</text>

  <!-- Centerline -->
  <line x1="180" y1="250" x2="780" y2="250" stroke="#888" stroke-width="0.7" stroke-dasharray="6 3 1 3"/>
  <text x="180" y="245" fill="#888" font-size="9">CL</text>

  <!-- Wall thickness callout -->
  <line x1="200" y1="165" x2="230" y2="165" stroke="#222" stroke-width="1"/>
  <line x1="200" y1="155" x2="200" y2="175" stroke="#222" stroke-width="1"/>
  <line x1="230" y1="155" x2="230" y2="175" stroke="#222" stroke-width="1"/>
  <text x="215" y="148" font-size="10" text-anchor="middle">0.157 in (4 mm) wall</text>

  <!-- Chamber volume callout -->
  <text x="400" y="270" font-size="11" text-anchor="middle" fill="#1F3A68" font-weight="bold">V_chamber = 130 cm³ (= 7.93 in³)</text>
  <text x="400" y="288" font-size="10" text-anchor="middle" fill="#445577" font-style="italic">— fired dimension; master scaled by 1/(1-shrinkage) = 1.136×</text>

  <!-- Body diameter callouts -->
  <line x1="200" y1="420" x2="720" y2="420" stroke="#222" stroke-width="1"/>
  <line x1="200" y1="415" x2="200" y2="425" stroke="#222" stroke-width="1"/>
  <line x1="720" y1="415" x2="720" y2="425" stroke="#222" stroke-width="1"/>
  <text x="460" y="438" font-size="11" text-anchor="middle">overall length = 4.10 in (10.4 cm) FIRED</text>

  <line x1="170" y1="110" x2="170" y2="390" stroke="#222" stroke-width="1"/>
  <line x1="165" y1="110" x2="175" y2="110" stroke="#222" stroke-width="1"/>
  <line x1="165" y1="390" x2="175" y2="390" stroke="#222" stroke-width="1"/>
  <text x="155" y="250" font-size="11" text-anchor="middle" transform="rotate(-90 155 250)">2.20 in (5.6 cm) FIRED</text>

  <!-- Notes block -->
  <rect x="20" y="455" width="760" height="40" fill="#E8EEF8" stroke="#888"/>
  <text x="28" y="471" font-size="10" fill="#222">NOTES: (1) Fipple geometry shown is target; final voicing tuned by hand at leather-hard + post-bisque.  (2) Wall thickness varies ± 0.020 in by casting time.</text>
  <text x="28" y="485" font-size="10" fill="#222">         (3) Datum = mouthpiece axis intersected with split-line plane.  (4) Master CAD scales ALL fired dimensions by master_scale_factor.</text>
</svg>
