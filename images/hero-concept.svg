<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFF7E6"/>
      <stop offset="100%" stop-color="#D9C9A3"/>
    </radialGradient>
    <radialGradient id="body" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F4E1B5"/>
      <stop offset="50%" stop-color="#C99A5B"/>
      <stop offset="100%" stop-color="#5C3E1E"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F1206"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="600" fill="url(#bg)"/>

  <!-- Body shadow -->
  <ellipse cx="500" cy="500" rx="320" ry="40" fill="#7A6233" opacity="0.4"/>

  <!-- Lentil body -->
  <path d="M 200 320
           C 200 130, 700 130, 800 295
           L 920 320
           L 800 345
           C 700 510, 200 510, 200 320 Z"
        fill="url(#body)" stroke="#3D2810" stroke-width="2"/>

  <!-- Voicing window -->
  <rect x="730" y="282" width="60" height="22" fill="#2A1E0C" stroke="#1F1206" stroke-width="1.5"/>

  <!-- Mouthpiece -->
  <rect x="900" y="316" width="50" height="14" fill="#5C3E1E" stroke="#3D2810" stroke-width="1.5"/>

  <!-- 12 finger holes — top side -->
  <ellipse cx="350" cy="220" rx="13" ry="9" fill="url(#hole)"/>
  <ellipse cx="395" cy="200" rx="14" ry="9" fill="url(#hole)"/>
  <ellipse cx="440" cy="190" rx="14" ry="9" fill="url(#hole)"/>
  <ellipse cx="485" cy="186" rx="15" ry="10" fill="url(#hole)"/>
  <ellipse cx="540" cy="190" rx="14" ry="9" fill="url(#hole)"/>
  <ellipse cx="590" cy="200" rx="13" ry="9" fill="url(#hole)"/>

  <ellipse cx="320" cy="270" rx="11" ry="7" fill="url(#hole)"/>
  <ellipse cx="370" cy="285" rx="11" ry="7" fill="url(#hole)"/>
  <ellipse cx="420" cy="295" rx="10" ry="6" fill="url(#hole)"/>
  <ellipse cx="470" cy="298" rx="11" ry="7" fill="url(#hole)"/>
  <ellipse cx="520" cy="295" rx="10" ry="6" fill="url(#hole)"/>
  <ellipse cx="570" cy="285" rx="11" ry="7" fill="url(#hole)"/>

  <!-- Glaze highlights -->
  <ellipse cx="350" cy="200" rx="120" ry="40" fill="white" opacity="0.18"/>
  <ellipse cx="600" cy="240" rx="100" ry="35" fill="white" opacity="0.10"/>

  <!-- Caption -->
  <rect x="0" y="552" width="1000" height="48" fill="#1F1206" opacity="0.85"/>
  <text x="20" y="575" fill="#FFE8B5" font-size="14" font-weight="bold">AI-GENERATED CONCEPT — Slip-Cast Ceramic Alto C 12-Hole Ocarina (OCA-001)</text>
  <text x="20" y="591" fill="#E0CFA0" font-size="11">Manufacturing dimensions come from ocarina-design-table.xlsx and the SVG drawings, NOT from this image. Replace with photo after first OCA-P1 fire.</text>
</svg>
