<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgX" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#FFF7E6"/>
      <stop offset="100%" stop-color="#D9C9A3"/>
    </radialGradient>
    <radialGradient id="bodyX" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F4E1B5"/>
      <stop offset="60%" stop-color="#C99A5B"/>
      <stop offset="100%" stop-color="#5C3E1E"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="600" fill="url(#bgX)"/>

  <!-- Stage labels -->
  <g font-size="12" fill="#3D2810" font-weight="bold">
    <text x="120" y="50">1. PLA master</text>
    <text x="320" y="50">2. plaster mold</text>
    <text x="540" y="50">3. greenware cast</text>
    <text x="760" y="50">4. fired + glazed</text>
  </g>

  <!-- Stage 1 — PLA master (printed) -->
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="180" height="160" fill="#E8E8E8" stroke="#888"/>
    <ellipse cx="90" cy="80" rx="60" ry="35" fill="#F4F4F4" stroke="#888" stroke-width="1.5"/>
    <line x1="30" y1="50" x2="150" y2="50" stroke="#888" stroke-dasharray="2 2"/>
    <line x1="30" y1="60" x2="150" y2="60" stroke="#888" stroke-dasharray="2 2"/>
    <line x1="30" y1="70" x2="150" y2="70" stroke="#888" stroke-dasharray="2 2"/>
    <line x1="30" y1="80" x2="150" y2="80" stroke="#888" stroke-dasharray="2 2"/>
    <line x1="30" y1="90" x2="150" y2="90" stroke="#888" stroke-dasharray="2 2"/>
    <line x1="30" y1="100" x2="150" y2="100" stroke="#888" stroke-dasharray="2 2"/>
    <text x="90" y="138" font-size="10" text-anchor="middle" fill="#3D2810">PLA, scaled 1.136×</text>
    <text x="90" y="152" font-size="9" text-anchor="middle" fill="#666">(layer lines visible)</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <line x1="240" y1="160" x2="280" y2="160" stroke="#3D2810" stroke-width="2"/>
  <polygon points="280,160 272,156 272,164" fill="#3D2810"/>

  <!-- Stage 2 — Plaster mold halves -->
  <g transform="translate(280,80)">
    <rect x="0" y="0" width="180" height="160" fill="#F5F0E0" stroke="#7E6B3A"/>
    <rect x="20" y="20" width="140" height="55" fill="#E8DFC2" stroke="#7E6B3A"/>
    <ellipse cx="90" cy="75" rx="50" ry="6" fill="#FBF6E8" stroke="#7E6B3A"/>
    <rect x="20" y="85" width="140" height="55" fill="#E8DFC2" stroke="#7E6B3A"/>
    <text x="90" y="155" font-size="10" text-anchor="middle" fill="#3D2810">USG #1 plaster</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <line x1="460" y1="160" x2="500" y2="160" stroke="#3D2810" stroke-width="2"/>
  <polygon points="500,160 492,156 492,164" fill="#3D2810"/>

  <!-- Stage 3 — Greenware -->
  <g transform="translate(500,80)">
    <rect x="0" y="0" width="180" height="160" fill="#D9C49B" stroke="#7E6B3A"/>
    <ellipse cx="90" cy="80" rx="60" ry="35" fill="#A8856A" stroke="#5C3E1E" stroke-width="1.5"/>
    <text x="90" y="138" font-size="10" text-anchor="middle" fill="#3D2810">Cone 6 stoneware</text>
    <text x="90" y="152" font-size="9" text-anchor="middle" fill="#666">leather-hard, holes cut</text>
  </g>

  <!-- Arrow 3 → 4 -->
  <line x1="680" y1="160" x2="720" y2="160" stroke="#3D2810" stroke-width="2"/>
  <polygon points="720,160 712,156 712,164" fill="#3D2810"/>

  <!-- Stage 4 — Fired + glazed -->
  <g transform="translate(720,80)">
    <rect x="0" y="0" width="200" height="160" fill="#FFE7BA" stroke="#7E6B3A"/>
    <ellipse cx="100" cy="80" rx="65" ry="38" fill="url(#bodyX)" stroke="#3D2810" stroke-width="2"/>
    <ellipse cx="80" cy="65" rx="40" ry="12" fill="white" opacity="0.25"/>
    <text x="100" y="138" font-size="10" text-anchor="middle" fill="#3D2810">bisque + glaze fire</text>
    <text x="100" y="152" font-size="9" text-anchor="middle" fill="#666">tuned ±25 ¢</text>
  </g>

  <!-- Workflow timeline -->
  <rect x="60" y="280" width="880" height="200" fill="white" stroke="#3D2810" stroke-width="1.5"/>
  <text x="80" y="310" font-size="14" fill="#3D2810" font-weight="bold">Slip-Cast Production Workflow</text>
  <g font-size="11" fill="#3D2810">
    <text x="80" y="338">→ CAD master from design table → scale by 1/(1−shrinkage) → 3D-print master in PLA → sand &amp; seal layer lines</text>
    <text x="80" y="358">→ Build cottles around sealed master → mix plaster (73:100 water:plaster) → pour both halves with registration keys</text>
    <text x="80" y="378">→ Demold master → dry plaster mold 24h → pour Cone 6 slip → drain at target wall thickness → demold leather-hard</text>
    <text x="80" y="398">→ Cut voicing window + 12 finger holes UNDERSIZED → smooth all edges → dry under plastic to equalize moisture</text>
    <text x="80" y="418">→ Bisque fire (Cone 06) → measure mass, volume, dimensions → tune holes upward with diamond files until ±25 ¢</text>
    <text x="80" y="438">→ Wax-resist mask all openings → glaze EXTERIOR ONLY → glaze fire (Cone 6) → final tune + log to validation.csv</text>
    <text x="80" y="465" font-style="italic" fill="#7E6B3A">Glaze in voicing window or holes will detune the instrument. Mask carefully. Tuning is irreversible — go small.</text>
  </g>

  <!-- Caption -->
  <rect x="0" y="552" width="1000" height="48" fill="#3D2810" opacity="0.92"/>
  <text x="20" y="575" fill="#FBF6E8" font-size="14" font-weight="bold">AI-GENERATED CONCEPT — Slip-Cast Ocarina Production Workflow (master → mold → cast → fire)</text>
  <text x="20" y="591" fill="#E0CFA0" font-size="11">Visual workflow only. Tuning corrections, hole diameters, and shrinkage scale come from the parametric design table.</text>
</svg>
